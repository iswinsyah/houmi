<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Meta tag ini SANGAT PENTING untuk memastikan tampilan mobile-friendly di dalam iframe -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Houmi - Sewa Villa</title>
    <link rel="icon" href="https://houmi.izzahgroup.com/uploads/1773679372_houmi_logo.png" type="image/png">
    
    <!-- ANTI-CACHE META TAGS (PENTING AGAR UPDATE LANGSUNG MUNCUL) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2D4F36',
                        secondary: '#F5F7F5',
                        accent: '#E8B059',
                        dark: '#333333',
                        sand: '#D2B48C',
                    },
                    fontFamily: {
                        brand: ['"Poiret One"', 'sans-serif'],
                        body: ['"Montserrat"', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <!-- Load Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Load Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Poiret+One&display=swap" rel="stylesheet">
    
    <!-- Load Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white font-body text-dark antialiased overflow-x-hidden">

    <!-- Container Utama Aplikasi -->
    <div id="app" class="w-full h-full min-h-screen relative">
        <!-- TAMPILAN LOADING AWAL (Supaya tidak blank putih) -->
        <div class="flex flex-col items-center justify-center h-screen bg-gray-50 text-center p-6">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-gray-200 border-t-green-800 mb-4"></div>
            <h2 class="text-xl font-bold text-gray-800">Sedang Memuat Houmi...</h2>
            <p class="text-sm text-gray-500 mt-2">Mohon tunggu sebentar.</p>
            
            <!-- Area ini akan muncul HANYA jika ada error -->
            <div id="error-log" class="hidden mt-6 text-left bg-red-100 border border-red-300 text-red-700 p-4 rounded-lg text-xs font-mono w-full max-w-md overflow-auto">
                <strong>⚠️ TERJADI ERROR:</strong><br>
                <span id="error-msg"></span>
            </div>
        </div>
    </div>

    <!-- Script Penangkap Error (Munculkan error di layar biar ketahuan) -->
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            document.getElementById('error-log').classList.remove('hidden');
            document.getElementById('error-msg').innerText += `\n${msg}\nLine: ${lineNo}`;
            return false;
        };
    </script>

    <!-- Tambahkan handler error jika file JS gagal dipanggil (misal 404) -->
    <script src="houmi.js?v=67" defer onerror="alert('CRITICAL ERROR: File houmi.js gagal dimuat! Pastikan file ini ada di folder/server.')"></script>
</body>
</html>
