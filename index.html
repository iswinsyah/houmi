<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Meta tag ini SANGAT PENTING untuk memastikan tampilan mobile-friendly di dalam iframe -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Houmi - Sewa Villa</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* CSS Tambahan untuk menyembunyikan scrollbar di menu kategori tapi tetap bisa digeser */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Area aman untuk tombol navigasi bawah di HP modern (iPhone dll) */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 16px); }
        
        /* Menghilangkan efek highlight biru saat disentuh di HP */
        body { -webkit-tap-highlight-color: transparent; }
        
        /* Animasi mulus saat buka halaman detail */
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .slide-in { animation: slideIn 0.3s ease-out forwards; }
        
        /* Tambahan untuk scroll snap pada galeri gambar */
        .snap-mandatory { scroll-snap-type: x mandatory; }
        .snap-center { scroll-snap-align: center; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased overflow-x-hidden">

    <!-- Container Utama Aplikasi -->
    <div id="app" class="w-full h-full min-h-screen relative"></div>

    <script src="script.js"></script>
</body>
</html>
